name: Build Windows Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist:win

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $files = @(
            Get-ChildItem -Path dist -Filter 'ADM-Mesa-de-Distribuicao-*-Setup-x64.exe'
            Get-ChildItem -Path dist -Filter 'ADM-Mesa-de-Distribuicao-*-Setup-x64.exe.blockmap'
            Get-ChildItem -Path dist -Filter 'ADM-Mesa-de-Distribuicao-*-Portable-x64.exe'
            Get-Item -Path dist/latest.yml
          ) | ForEach-Object { $_.FullName }

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $files --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $tag $files --repo $env:GITHUB_REPOSITORY --title "ADM Mesa de Distribuicao $tag" --notes "Release $tag" --latest
          }
